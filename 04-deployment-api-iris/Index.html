<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klasifikasi Bunga Iris</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --sage: #5b6d5b;
    --sage-dark: #3c4a3c;
    --cream: #f6f3ec;
    --iris-purple: #6b5b95;
    --line: #ddd6c7;
    --ink: #2b2b26;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .card {
    background: white;
    max-width: 520px;
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 40px 36px;
    position: relative;
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sage);
    font-weight: 600;
    margin: 0 0 8px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 600;
    margin: 0 0 6px;
    color: var(--sage-dark);
  }

  .subtitle {
    font-size: 14px;
    color: #6b6a63;
    margin: 0 0 28px;
    line-height: 1.5;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 5px;
    color: var(--ink);
  }

  input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 3px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
  }

  input:focus {
    outline: 2px solid var(--sage);
    outline-offset: 1px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 16px;
  }

  button {
    width: 100%;
    margin-top: 8px;
    background: var(--sage-dark);
    color: white;
    border: none;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  button:hover { background: var(--sage); }
  button:disabled { opacity: 0.6; cursor: default; }

  .result {
    margin-top: 24px;
    padding: 20px;
    border-radius: 3px;
    background: var(--cream);
    border: 1px solid var(--line);
    display: none;
  }

  .result.show { display: block; }

  .result-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--sage);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .result-species {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    color: var(--iris-purple);
    margin: 0 0 4px;
    text-transform: capitalize;
  }

  .result-confidence {
    font-size: 13px;
    color: #6b6a63;
    margin-bottom: 14px;
  }

  .bars { display: flex; flex-direction: column; gap: 8px; }

  .bar-row {
    display: grid;
    grid-template-columns: 90px 1fr 44px;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .bar-track {
    background: #e7e3d6;
    border-radius: 2px;
    height: 8px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--iris-purple);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .error {
    margin-top: 20px;
    padding: 14px 16px;
    background: #fdf1f0;
    border: 1px solid #e8b8b4;
    color: #a13a34;
    border-radius: 3px;
    font-size: 13px;
    display: none;
  }

  .error.show { display: block; }

  .api-note {
    margin-top: 20px;
    font-size: 11px;
    color: #9a988e;
    text-align: center;
  }
</style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Machine Learning</p>
  <h1>Klasifikasi Bunga Iris</h1>
  <p class="subtitle">Masukkan ukuran kelopak dan mahkota bunga (dalam cm), model akan memprediksi jenis iris-nya.</p>

  <form id="form-prediksi">
    <div class="grid">
      <div class="field">
        <label for="panjang_kelopak">Panjang kelopak (sepal)</label>
        <input type="number" step="0.1" id="panjang_kelopak" value="5.1" required>
      </div>
      <div class="field">
        <label for="lebar_kelopak">Lebar kelopak (sepal)</label>
        <input type="number" step="0.1" id="lebar_kelopak" value="3.5" required>
      </div>
      <div class="field">
        <label for="panjang_mahkota">Panjang mahkota (petal)</label>
        <input type="number" step="0.1" id="panjang_mahkota" value="1.4" required>
      </div>
      <div class="field">
        <label for="lebar_mahkota">Lebar mahkota (petal)</label>
        <input type="number" step="0.1" id="lebar_mahkota" value="0.2" required>
      </div>
    </div>
    <button type="submit" id="btn-submit">Prediksi jenis bunga</button>
  </form>

  <div class="error" id="box-error"></div>

  <div class="result" id="box-hasil">
    <p class="result-label">Hasil prediksi</p>
    <p class="result-species" id="hasil-jenis">-</p>
    <p class="result-confidence" id="hasil-keyakinan">-</p>
    <div class="bars" id="hasil-bars"></div>
  </div>

  <p class="api-note">Terhubung ke API di <code>http://127.0.0.1:8000</code></p>
</div>

<script>
  // Ganti URL ini kalau API sudah di-deploy ke cloud (bukan lagi localhost)
  const API_URL = "https://portofolio-data-science-production.up.railway.app/predict";

  const form = document.getElementById('form-prediksi');
  const btn = document.getElementById('btn-submit');
  const boxHasil = document.getElementById('box-hasil');
  const boxError = document.getElementById('box-error');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    boxError.classList.remove('show');
    boxHasil.classList.remove('show');
    btn.disabled = true;
    btn.textContent = "Memprediksi...";

    const payload = {
      panjang_kelopak: parseFloat(document.getElementById('panjang_kelopak').value),
      lebar_kelopak: parseFloat(document.getElementById('lebar_kelopak').value),
      panjang_mahkota: parseFloat(document.getElementById('panjang_mahkota').value),
      lebar_mahkota: parseFloat(document.getElementById('lebar_mahkota').value),
    };

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => null);
        throw new Error(errData?.detail || `Server merespons dengan status ${res.status}`);
      }

      const data = await res.json();
      document.getElementById('hasil-jenis').textContent = data.jenis_bunga;
      document.getElementById('hasil-keyakinan').textContent =
        `Tingkat keyakinan: ${data.tingkat_keyakinan}%`;

      const barsEl = document.getElementById('hasil-bars');
      barsEl.innerHTML = '';
      Object.entries(data.detail_probabilitas).forEach(([nama, persen]) => {
        barsEl.innerHTML += `
          <div class="bar-row">
            <span>${nama}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${persen}%"></div></div>
            <span>${persen}%</span>
          </div>`;
      });

      boxHasil.classList.add('show');
    } catch (err) {
      boxError.textContent = "Gagal terhubung ke API: " + err.message +
        ". Pastikan server uvicorn sedang berjalan di 127.0.0.1:8000.";
      boxError.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = "Prediksi jenis bunga";
    }
  });
</script>

</body>
</html>
